apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: cd-pipeline-run
spec:
  pipelineRef:
    name: cd-pipeline
  params:
    - name: repo-url
      value: https://github.com/ATHOY43259/duwjx-tdd_bdd_PracticeCode.git
    - name: branch
      value: main
    - name: build-image
      value: us.icr.io/sn-labs-athoykantiro/accounts:latest
  workspaces:
    - name: pipeline-workspace
      persistentVolumeClaim:
        claimName: pipeline-pvc
